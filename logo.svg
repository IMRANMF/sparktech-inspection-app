<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="crescentGrad" x1="20%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fde047"/>
    </linearGradient>
    <mask id="crescentMask">
      <rect width="200" height="200" fill="black"/>
      <circle cx="108" cy="100" r="46" fill="white"/>
      <circle cx="80" cy="98" r="32" fill="black"/>
    </mask>
  </defs>

  <!-- Gear silhouette -->
  <g fill="#0f172a">
    <circle cx="100" cy="100" r="64"/>
    <rect x="91" y="6" width="18" height="26" transform="rotate(0 100 100)"/>
    <rect x="91" y="6" width="18" height="26" transform="rotate(45 100 100)"/>
    <rect x="91" y="6" width="18" height="26" transform="rotate(90 100 100)"/>
    <rect x="91" y="6" width="18" height="26" transform="rotate(135 100 100)"/>
    <rect x="91" y="6" width="18" height="26" transform="rotate(180 100 100)"/>
    <rect x="91" y="6" width="18" height="26" transform="rotate(225 100 100)"/>
    <rect x="91" y="6" width="18" height="26" transform="rotate(270 100 100)"/>
    <rect x="91" y="6" width="18" height="26" transform="rotate(315 100 100)"/>
  </g>

  <!-- White gap ring -->
  <circle cx="100" cy="100" r="53" fill="#ffffff"/>

  <!-- Crescent, opening left -->
  <circle cx="108" cy="100" r="46" fill="url(#crescentGrad)" mask="url(#crescentMask)"/>

  <!-- Drill / EDM head -->
  <g fill="#0f172a">
    <rect x="82" y="16" width="36" height="38" rx="2"/>
    <polygon points="82,54 118,54 100,70"/>
  </g>

  <!-- Spark burst -->
  <polygon fill="url(#sparkGrad)" points="
    100,100 106,124 130,112 112,132 138,138 112,144 126,166 104,150
    100,178 96,150 74,166 88,144 62,138 88,132 70,112 94,124
  "/>
</svg>
